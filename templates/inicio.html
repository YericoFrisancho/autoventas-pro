<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoVentas Pro - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f6fbff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .brand-title {
            color: #0b1c3c;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
        }
        
        .brand-icon {
            color: #0056ff;
            font-size: 2.5rem;
            vertical-align: middle;
            margin-right: 10px;
        }

        .subtitle-main {
            color: #4a5568;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .subtitle-secondary {
            color: #718096;
            font-size: 0.95rem;
        }

        .main-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
            border: none;
            padding: 2.5rem;
            width: 100%;
            max-width: 650px;
        }

        .feature-box {
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            height: 100%;
        }

        .feature-box-blue {
            background-color: #f0f7ff;
        }

        .feature-box-green {
            background-color: #f0fdf4;
        }

        .feature-icon-blue { color: #0056ff; font-size: 1.5rem; }
        .feature-icon-green { color: #16a34a; font-size: 1.5rem; }

        .feature-title {
            font-weight: 700;
            color: #1a202c;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .feature-desc {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 0;
            line-height: 1.4;
        }

        .btn-custom-primary {
            background-color: #0056ff;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }

        .btn-custom-primary:hover {
            background-color: #0046d5;
            color: white;
        }

        .btn-custom-outline {
            background-color: transparent;
            color: #0056ff;
            border: 1px solid #0056ff;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-custom-outline:hover {
            background-color: #f0f7ff;
            color: #0056ff;
        }

        .terms-text {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="mb-4">
            <h1 class="brand-title">
                <i class="bi bi-car-front-fill brand-icon"></i>AutoVentas Pro
            </h1>
            <p class="subtitle-main mt-3 mb-1">Tu próximo auto está aquí</p>
            <p class="subtitle-secondary">Sistema inteligente de financiamiento vehicular</p>
        </div>

        <div class="main-card mx-auto">
            <div class="row g-3 mb-4 text-start">
                <div class="col-md-6">
                    <div class="feature-box feature-box-blue">
                        <i class="bi bi-graph-up-arrow feature-icon-blue"></i>
                        <div>
                            <h6 class="feature-title">Financiamiento Flexible</h6>
                            <p class="feature-desc">Cuotas adaptadas a tu presupuesto</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="feature-box feature-box-green">
                        <i class="bi bi-car-front feature-icon-green"></i>
                        <div>
                            <h6 class="feature-title">Amplio Catálogo</h6>
                            <p class="feature-desc">Encuentra el auto perfecto para ti</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-3 mt-4">
                <a href="/login" class="btn btn-custom-primary">Iniciar Sesión</a>
                <a href="/registro" class="btn btn-custom-outline">Registrarse</a>
            </div>

            <div class="terms-text">
                Al continuar, aceptas nuestros términos y condiciones
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
