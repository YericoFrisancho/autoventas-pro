<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AutoVentas Pro - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h3 class="text-center text-primary mb-4">🚗 AutoVentas Pro</h3>
                        <h5 class="text-center mb-4">Crear Cuenta Nueva</h5>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                          {% if messages %}
                            {% for category, message in messages %}
                              <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form action="/registro" method="POST">
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" class="form-control" name="nombre" maxlength="20" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">Apellido</label>
                                    <input type="text" class="form-control" name="apellido" maxlength="20" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">DNI</label>
                                <input type="text" class="form-control" name="dni" maxlength="8" minlength="8" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" name="correo" maxlength="100" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" name="contrasenia" maxlength="20" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 mb-3">Registrarme</button>
                        </form>
                        <div class="text-center">
                            <small>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
