<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoVentas Pro - Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Paleta y fondos mantenidos de inicio.html para consistencia */
        body {
            background-color: #f6fbff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .container-box {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        /* Estilo del botón volver externo */
        .btn-back {
            color: #0056ff;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #0046d5;
        }

        .main-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
            border: none;
            padding: 2.5rem;
        }

        .brand-title {
            color: #0b1c3c;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
        }

        .brand-icon {
            color: #0056ff;
            font-size: 2rem;
            vertical-align: middle;
            margin-right: 8px;
        }

        .subtitle-main {
            color: #0b1c3c;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .subtitle-secondary {
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.4rem;
        }

        /* Estilos clave para meter los iconos dentro del input (estilo Figma) */
        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .form-control-custom {
            padding-left: 45px; /* Espacio para que el texto no pise el icono */
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
            color: #4a5568;
            transition: all 0.2s;
        }

        .form-control-custom::placeholder {
            color: #cbd5e1;
        }

        .form-control-custom:focus {
            border-color: #0056ff;
            box-shadow: 0 0 0 0.25rem rgba(0, 86, 255, 0.1);
        }

        .btn-custom-primary {
            background-color: #0056ff;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-custom-primary:hover {
            background-color: #0046d5;
            color: white;
        }

        .login-link {
            color: #0056ff;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container-box px-3">
        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>

        <div class="main-card">
            
            <div class="text-center mb-4">
                <h1 class="brand-title">
                    <i class="bi bi-car-front-fill brand-icon"></i>AutoVentas Pro
                </h1>
                <h2 class="subtitle-main">Crear Cuenta</h2>
                <p class="subtitle-secondary">Regístrate para acceder al catálogo</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" style="font-size: 0.9rem;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/registro" method="POST">
                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0">
                        <label class="form-label">Nombre</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-person"></i>
                            <input type="text" class="form-control form-control-custom" name="nombre" placeholder="Juan" maxlength="20" required>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Apellido</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-person"></i>
                            <input type="text" class="form-control form-control-custom" name="apellido" placeholder="Pérez" maxlength="20" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <div class="input-icon-wrapper">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="form-control form-control-custom" name="correo" placeholder="ejemplo@correo.com" maxlength="100" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-icon-wrapper">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control form-control-custom" name="contrasenia" placeholder="••••••••" maxlength="20" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">DNI</label>
                    <div class="input-icon-wrapper">
                        <i class="bi bi-person-vcard"></i>
                        <input type="text" class="form-control form-control-custom" name="dni" placeholder="12345678" maxlength="8" minlength="8" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom-primary mb-4">Registrar</button>
            </form>

            <div class="text-center" style="font-size: 0.9rem; color: #4a5568;">
                ¿Ya tienes cuenta? <a href="/login" class="login-link">Inicia sesión aquí</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
